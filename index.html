function addManualItem() {
  const text = document.getElementById('manualInput').value.trim();
  if (!text) {
    showToast('请输入内容', 'error');
    return;
  }
  const now = Date.now();
  // Support multi-line: each non-empty line = one item
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const planDate = document.getElementById('manualPlanDate').value || null;
  const deadline = document.getElementById('manualDeadline').value || null;
  const newItems = lines.map((line, idx) => {
    if (manualPendingType === 'todo') {
      return {
        id: 'item_' + now + '_' + idx,
        type: 'todo',
        content: line,
        completed: false,
        planDate: planDate,
        deadlineDate: deadline,
        priority: manualPendingPriority,
        tags: [],
        createdAt: now + idx,
        source: 'manual'
      };
    } else {
      return {
        id: 'item_' + now + '_' + idx,
        type: 'reference',
        content: line,
        completed: null,
        planDate: null,
        deadlineDate: null,
        priority: null,
        tags: [...manualPendingTags],
        createdAt: now + idx,
        source: 'manual'
      };
    }
  });
  state.items.push(...newItems);
  saveData();
  // Reset form
  document.getElementById('manualInput').value = '';
  document.getElementById('manualPlanDate').value = '';
  document.getElementById('manualDeadline').value = '';
  render();
  triggerAutoSync();
  const count = newItems.length;
  showToast(`已添加 ${count} 条${manualPendingType === 'todo' ? '待办' : '资料'}${count > 1 ? '' : ''}`, 'success');
}

// ===== GitHub Gist Sync =====
const SYNC_SETTINGS_KEY = 'ai_inbox_sync_settings_v1';
let autoSyncTimer = null;

function loadSyncSettings() {
  try {
    const raw = localStorage.getItem(SYNC_SETTINGS_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { token: '', gistId: '', autoSync: false };
}

function saveSyncSettings(settings) {
  localStorage.setItem(SYNC_SETTINGS_KEY, JSON.stringify(settings));
}

function fillSyncSettingsUI() {
  const s = loadSyncSettings();
  document.getElementById('syncToken').value = s.token || '';
  document.getElementById('syncGistId').value = s.gistId || '';
  document.getElementById('autoSync').checked = s.autoSync || false;
  document.getElementById('syncToken').type = 'password';
  document.getElementById('toggleSyncTokenBtn').textContent = '👁';
  updateSyncStatus();
}

function collectSyncSettings() {
  return {
    token: document.getElementById('syncToken').value.trim(),
    gistId: document.getElementById('syncGistId').value.trim(),
    autoSync: document.getElementById('autoSync').checked
  };
}

function updateSyncStatus() {
  const s = loadSyncSettings();
  const dot = document.getElementById('syncStatusDot');
  const text = document.getElementById('syncStatusText');
  if (s.gistId && s.token) {
    dot.className = 'status-dot connected';
    text.textContent = `已绑定 Gist (${s.gistId.substring(0, 8)}...)`;
  } else if (s.token) {
    dot.className = 'status-dot';
    text.textContent = '已填 Token，未绑定 Gist';
  } else {
    dot.className = 'status-dot';
    text.textContent = '未配置';
  }
}

async function gistCreate(token, data) {
  const resp = await fetch('https://api.github.com/gists', {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${token}`,
      'Accept': 'application/vnd.github+json',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      description: 'AI 智能收集箱数据同步',
      public: false,
      files: {
        'ai-inbox-data.json': {
          content: JSON.stringify(data, null, 2)
        }
      }
    })
  });
  if (!resp.ok) {
    const err = await resp.text();
    throw new Error(`创建 Gist 失败: HTTP ${resp.status} ${err.substring(0, 100)}`);
  }
  return await resp.json();
}

async function gistUpdate(token, gistId, data) {
  const resp = await fetch(`https://api.github.com/gists/${gistId}`, {
    method: 'PATCH',
    headers: {
      'Authorization': `Bearer ${token}`,
      'Accept': 'application/vnd.github+json',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      files: {
        'ai-inbox-data.json': {
          content: JSON.stringify(data, null, 2)
        }
      }
    })
  });
  if (!resp.ok) {
    const err = await resp.text();
    throw new Error(`更新 Gist 失败: HTTP ${resp.status} ${err.substring(0, 100)}`);
  }
  return await resp.json();
}

async function gistRead(token, gistId) {
  const resp = await fetch(`https://api.github.com/gists/${gistId}`, {
    headers: {
      'Authorization': `Bearer ${token}`,
      'Accept': 'application/vnd.github+json'
    }
  });
  if (!resp.ok) {
    const err = await resp.text();
    throw new Error(`读取 Gist 失败: HTTP ${resp.status} ${err.substring(0, 100)}`);
  }
  const data = await resp.json();
  const file = data.files && data.files['ai-inbox-data.json'];
  if (!file) throw new Error('Gist 中未找到 ai-inbox-data.json');
  return JSON.parse(file.content);
}

async function syncPush() {
  const s = collectSyncSettings();
  if (!s.token) {
    showToast('请先填写 GitHub Token', 'error');
    return;
  }
  const payload = {
    version: 2,
    syncedAt: new Date().toISOString(),
    device: navigator.userAgent.substring(0, 50),
    count: state.items.length,
    items: state.items
  };

  const dot = document.getElementById('syncStatusDot');
  const text = document.getElementById('syncStatusText');
  dot.className = 'status-dot';
  text.textContent = '推送中...';

  try {
    if (!s.gistId) {
      // Create new gist
      const gist = await gistCreate(s.token, payload);
      s.gistId = gist.id;
      document.getElementById('syncGistId').value = gist.id;
      saveSyncSettings(s);
      updateSyncStatus();
      showToast(`已创建 Gist 并推送 ${state.items.length} 条数据`, 'success');
    } else {
      await gistUpdate(s.token, s.gistId, payload);
      dot.className = 'status-dot connected';
      text.textContent = `已同步 · ${new Date().toLocaleTimeString('zh-CN')}`;
      showToast(`已推送 ${state.items.length} 条到云端`, 'success');
    }
  } catch(err) {
    dot.className = 'status-dot error';
    text.textContent = '同步失败';
    showToast(err.message, 'error');
  }
}

async function syncPull() {
  const s = collectSyncSettings();
  if (!s.token || !s.gistId) {
    showToast('请先填写 Token 和 Gist ID', 'error');
    return;
  }

  const dot = document.getElementById('syncStatusDot');
  const text = document.getElementById('syncStatusText');
  dot.className = 'status-dot';
  text.textContent = '拉取中...';

  try {
    const cloudData = await gistRead(s.token, s.gistId);
    if (!cloudData.items || !Array.isArray(cloudData.items)) {
      throw new Error('云端数据格式无效');
    }

    // Merge: cloud replaces local (with migration)
    const remoteItems = cloudData.items;
    remoteItems.forEach(item => {
      if (item.planDate === undefined) item.planDate = null;
      if (item.deadlineDate === undefined) item.deadlineDate = null;
      if (item.priority === undefined) item.priority = (item.type === 'todo') ? 'normal' : null;
      if (item.tags === undefined || !Array.isArray(item.tags)) item.tags = [];
      if (item.type === 'bookmark') {
        item.type = 'reference';
        if (!item.tags.includes('收藏')) item.tags.push('收藏');
      } else if (item.type === 'idea') {
        item.type = 'reference';
        if (!item.tags.includes('灵感')) item.tags.push('灵感');
      }
    });

    const cloudCount = remoteItems.length;
    state.items = remoteItems;
    saveData();
    render();
    updateSyncStatus();
    const syncTime = cloudData.syncedAt ? new Date(cloudData.syncedAt).toLocaleString('zh-CN') : '';
    showToast(`已从云端拉取 ${cloudCount} 条${syncTime ? '（同步于 ' + syncTime + '）' : ''}`, 'success');
  } catch(err) {
    dot.className = 'status-dot error';
    text.textContent = '拉取失败';
    showToast(err.message, 'error');
  }
}

function triggerAutoSync() {
  const s = loadSyncSettings();
  if (!s.autoSync || !s.token || !s.gistId) return;
  if (autoSyncTimer) clearTimeout(autoSyncTimer);
  autoSyncTimer = setTimeout(() => {
    syncPush();
  }, 3000);
}

// ===== Event Bindings =====
function bindEvents() {
  document.getElementById('themeBtn').addEventListener('click', toggleTheme);

  document.getElementById('settingsBtn').addEventListener('click', () => {
    togglePanel('settingsPanel', 'settingsBtn');
    if (document.getElementById('settingsPanel').classList.contains('open')) {
      const s = loadSettings();
      document.getElementById('apiBase').value = s.apiBase || '';
      document.getElementById('apiKey').value = s.apiKey || '';
      document.getElementById('apiModel').value = s.apiModel || '';
      document.getElementById('rememberKey').checked = s.rememberKey !== false;
      // 重置密钥显示状态
      document.getElementById('apiKey').type = 'password';
      document.getElementById('toggleApiKeyBtn').textContent = '👁';
    }
  });

  document.getElementById('saveSettingsBtn').addEventListener('click', () => {
    const settings = {
      apiBase: document.getElementById('apiBase').value.trim(),
      apiKey: document.getElementById('apiKey').value.trim(),
      apiModel: document.getElementById('apiModel').value.trim(),
      rememberKey: document.getElementById('rememberKey').checked
    };
    saveSettings(settings);
    showToast('设置已保存', 'success');
    document.getElementById('settingsPanel').classList.remove('open');
    document.getElementById('settingsBtn').classList.remove('active');
  });

  document.getElementById('testBtn').addEventListener('click', testConnection);
  document.getElementById('toggleApiKeyBtn').addEventListener('click', toggleApiKeyVisibility);

  // API 服务商预设
  document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.getElementById('apiBase').value = btn.dataset.base;
      document.getElementById('apiModel').value = btn.dataset.model;
      document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('apiKey').focus();
    });
  });

  document.getElementById('newBtn').addEventListener('click', () => {
    togglePanel('inputPanel');
  });

  // Mode switcher
  document.querySelectorAll('.mode-tab').forEach(tab => {
    tab.addEventListener('click', () => switchInputMode(tab.dataset.mode));
  });

  // Manual mode
  document.querySelectorAll('.manual-type-btn').forEach(btn => {
    btn.addEventListener('click', () => selectManualType(btn.dataset.type));
  });
  document.querySelectorAll('.manual-priority-btn').forEach(btn => {
    btn.addEventListener('click', () => selectManualPriority(btn.dataset.priority));
  });
  document.getElementById('manualAddBtn').addEventListener('click', addManualItem);
  document.getElementById('manualCancelBtn').addEventListener('click', () => {
    document.getElementById('manualInput').value = '';
    document.getElementById('manualPlanDate').value = '';
    document.getElementById('manualDeadline').value = '';
    manualPendingTags = [];
    updateManualTagsUI();
    document.getElementById('inputPanel').classList.remove('open');
  });
  document.getElementById('manualTagAddBtn').addEventListener('click', () => {
    addManualTag(document.getElementById('manualTagInput').value);
  });
  document.getElementById('manualTagInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); addManualTag(e.target.value); }
  });
  document.getElementById('manualInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      addManualItem();
    }
  });

  document.getElementById('cancelBtn').addEventListener('click', () => {
    document.getElementById('inputText').value = '';
    document.getElementById('inputPanel').classList.remove('open');
  });

  document.getElementById('analyzeBtn').addEventListener('click', analyzeContent);

  // Search
  document.getElementById('searchInput').addEventListener('input', (e) => {
    state.searchKeyword = e.target.value;
    document.getElementById('searchClear').style.display = state.searchKeyword ? 'flex' : 'none';
    if (state.filter === 'todo' || state.filter === 'reference') render();
  });
  document.getElementById('searchClear').addEventListener('click', () => {
    document.getElementById('searchInput').value = '';
    state.searchKeyword = '';
    document.getElementById('searchClear').style.display = 'none';
    if (state.filter === 'todo' || state.filter === 'reference') render();
  });
  document.querySelectorAll('.quick-filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const q = btn.dataset.quick;
      if (state.quickFilter === q) {
        state.quickFilter = null;
        btn.classList.remove('active');
      } else {
        state.quickFilter = q;
        document.querySelectorAll('.quick-filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      }
      if (state.filter === 'todo') render();
    });
  });

  // Data export/import (设置面板内的按钮)
  document.getElementById('exportJsonBtn').addEventListener('click', () => { exportJson(); closeDataMenu(); });
  document.getElementById('exportMdBtn').addEventListener('click', () => { exportMarkdown(); closeDataMenu(); });
  document.getElementById('importJsonBtn').addEventListener('click', () => {
    document.getElementById('importJsonFile').click();
  });
  document.getElementById('importJsonFile').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) importJson(file);
    e.target.value = '';
  });

  // Sync
  document.getElementById('syncPushBtn').addEventListener('click', () => {
    saveSyncSettings(collectSyncSettings());
    syncPush();
  });
  document.getElementById('syncPullBtn').addEventListener('click', () => {
    saveSyncSettings(collectSyncSettings());
    syncPull();
  });
  document.getElementById('toggleSyncTokenBtn').addEventListener('click', () => {
    const input = document.getElementById('syncToken');
    const btn = document.getElementById('toggleSyncTokenBtn');
    if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
    else { input.type = 'password'; btn.textContent = '👁'; }
  });
  document.getElementById('autoSync').addEventListener('change', () => {
    const s = collectSyncSettings();
    saveSyncSettings(s);
    if (s.autoSync && s.token && s.gistId) {
      showToast('已开启自动同步', 'success');
    }
  });
  // Save sync settings when token/gistId changes
  document.getElementById('syncToken').addEventListener('blur', () => {
    saveSyncSettings(collectSyncSettings());
    updateSyncStatus();
  });
  document.getElementById('syncGistId').addEventListener('blur', () => {
    saveSyncSettings(collectSyncSettings());
    updateSyncStatus();
  });

  // Header 数据菜单
  const dataMenuBtn = document.getElementById('dataMenuBtn');
  const dataMenu = document.getElementById('dataMenu');
  dataMenuBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    dataMenu.classList.toggle('show');
    dataMenuBtn.classList.toggle('active');
  });
  document.getElementById('dataMenuExportJson').addEventListener('click', () => { exportJson(); closeDataMenu(); });
  document.getElementById('dataMenuExportMd').addEventListener('click', () => { exportMarkdown(); closeDataMenu(); });
  document.getElementById('dataMenuImportJson').addEventListener('click', () => { closeDataMenu(); document.getElementById('importJsonFile').click(); });
  document.addEventListener('click', (e) => {
    if (!dataMenu.contains(e.target) && e.target !== dataMenuBtn) closeDataMenu();
  });

  // Tabs
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      state.filter = tab.dataset.filter;
      if (state.filter === 'calendar') {
        state.calendarYear = new Date().getFullYear();
        state.calendarMonth = new Date().getMonth();
      }
      render();
    });
  });

  // Calendar nav
  document.getElementById('calPrev').addEventListener('click', () => {
    state.calendarMonth--;
    if (state.calendarMonth < 0) { state.calendarMonth = 11; state.calendarYear--; }
    renderCalendar();
  });
  document.getElementById('calNext').addEventListener('click', () => {
    state.calendarMonth++;
    if (state.calendarMonth > 11) { state.calendarMonth = 0; state.calendarYear++; }
    renderCalendar();
  });

  // Date picker
  document.getElementById('datePickerSave').addEventListener('click', saveDatePicker);
  document.getElementById('datePickerCancel').addEventListener('click', closeDatePicker);
  document.getElementById('datePickerClear').addEventListener('click', clearDatePicker);
  document.getElementById('datePickerOverlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('datePickerOverlay')) closeDatePicker();
  });

  // Edit panel
  document.getElementById('editSave').addEventListener('click', saveEditPanel);
  document.getElementById('editCancel').addEventListener('click', closeEditPanel);
  document.getElementById('editOverlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('editOverlay')) closeEditPanel();
  });
  document.querySelectorAll('.edit-type-btn').forEach(btn => {
    btn.addEventListener('click', () => selectEditType(btn.dataset.type));
  });
  document.querySelectorAll('.edit-priority-btn').forEach(btn => {
    btn.addEventListener('click', () => selectEditPriority(btn.dataset.priority));
  });
  // 标签输入：回车添加、添加按钮
  document.getElementById('editTagAddBtn').addEventListener('click', () => {
    addEditTag(document.getElementById('editTagInput').value);
  });
  document.getElementById('editTagInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      addEditTag(e.target.value);
    }
  });
  document.getElementById('editContent').addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      saveEditPanel();
    }
  });

  // Calendar detail
  document.getElementById('calDetailClose').addEventListener('click', closeCalendarDetail);
  document.getElementById('calendarDetail').addEventListener('click', (e) => {
    if (e.target === document.getElementById('calendarDetail')) closeCalendarDetail();
  });

  // System theme change
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
    if (loadTheme() === 'auto') applyTheme('auto');
  });

  // Global keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    // Ctrl/Cmd + N → open new entry panel
    if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
      e.preventDefault();
      const panel = document.getElementById('inputPanel');
      const settings = document.getElementById('settingsPanel');
      if (settings.classList.contains('open')) {
        settings.classList.remove('open');
        document.getElementById('settingsBtn').classList.remove('active');
      }
      if (!panel.classList.contains('open')) {
        panel.classList.add('open');
        setTimeout(() => {
          // Focus the active mode's input
          if (document.getElementById('aiModeContent').style.display !== 'none') {
            document.getElementById('inputText').focus();
          } else {
            document.getElementById('manualInput').focus();
          }
        }, 300);
      }
    }
    // Escape → close any open panel/popup
    if (e.key === 'Escape') {
      document.getElementById('inputPanel').classList.remove('open');
      document.getElementById('settingsPanel').classList.remove('open');
      document.getElementById('settingsBtn').classList.remove('active');
      document.getElementById('datePickerOverlay').classList.remove('show');
      document.getElementById('editOverlay').classList.remove('show');
      document.getElementById('calendarDetail').classList.remove('show');
      closeDataMenu();
    }
  });

  // Keyboard shortcut
  document.getElementById('inputText').addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      analyzeContent();
    }
  });
}

// ===== Init =====
function init() {
  loadData();
  applyTheme(loadTheme());
  fillSyncSettingsUI();
  bindEvents();
  render();
}

init();
</script>
